<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Bug Tracker</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header class="project-header">
        <h1>Free Fire Bug Reports</h1>
        <p>Sistem pelaporan bug karakter</p>
    </header>

    <main class="main-content">
        <section id="content">
            <article class="article-content">
                <h2>Filter Karakter</h2><br>
                <select id="agentFilter">
                    <option value="">Semua Karakter</option>
                    <option value="Alok">Alok</option>
                    <option value="Crono">Crono</option>
                    <option value="Jota">Jota</option>
                    <option value="Moco">Moco</option>
                    <option value="Hayato">Hayato</option>
                </select>
            </article>

            <article class="article-content">
                <h2>Laporkan Bug Baru</h2>
                <form id="bugForm">
                    <div class="form-row">
                        <select id="agentSelect" required>
                            <option value="">Pilih Karakter</option>
                            <option value="Alok">Alok</option>
                            <option value="Crono">Crono</option>
                            <option value="Jota">Jota</option>
                            <option value="Moco">Moco</option>
                            <option value="Hayato">Hayato</option>
                        </select>
                        <select id="categorySelect" required>
                            <option value="">Pilih Kategori</option>
                            <option value="Movement">Movement</option>
                            <option value="Skill">Skill</option>
                            <option value="Ultimate">Ultimate / Skill Aktif</option>
                            <option value="Other">Lainnya</option>
                        </select>
                    </div>
                    <textarea id="description" placeholder="Jelaskan bug secara detail (mode: Ranked / Classic, lokasi map, senjata)" required></textarea>
                    <button type="submit" id="formSubmitBtn">Tambah Laporan</button>
                </form>
            </article>

            <article class="article-content">
                <h2>Laporan Bug (<span id="reportCount">0</span>)</h2>
                <div id="reports"></div>
                <button id="clearAll">Hapus Semua Laporan</button>
            </article>

            <article class="article-content">
                <h3 class="h3">Kembali ke beranda</h3>
                <button class="button" onclick="window.location.href='home.html'">Home</button>
            </article>
        </section>
    </main>

    <footer>
        Copyright © 2026 by DeBugReport All rights reserved.
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
